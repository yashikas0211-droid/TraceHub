<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Found Item | TraceHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->

<header class="navbar">

    <div class="logo">
        <h1>TraceHub</h1>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="lost.html">Lost</a>
        <a href="found.html">Found</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>

</header>

<!-- FOUND ITEM SECTION -->

<section class="lost-section">

    <!-- LEFT SIDE -->

    <div class="lost-left">
        <h2>Report Found Item</h2>
        <p>
            Found something important? Submit the details here
            so the real owner can recover it quickly through TraceHub.
        </p>
    </div>

    <!-- RIGHT SIDE FORM -->

    <div class="lost-form-box">

        <h3>Found Item Form</h3>

        <input type="text" id="foundItemName" placeholder="Item Name">

        <input type="text" id="foundLocation" placeholder="Found Location">

        <input type="date" id="foundDate">

        <textarea id="foundDescription" placeholder="Item Description"></textarea>

        <input type="text" id="foundContact" placeholder="Contact Number">

        <button onclick="submitFoundItem()">Submit Report</button>

        <div id="foundOutput" class="output-box">
            Your found item report will appear here.
        </div>

    </div>

</section>

<footer>
    <p>© 2026 TraceHub | Smart Lost & Found Website</p>
</footer>

<script src="script.js"></script>

</body>
</html>
